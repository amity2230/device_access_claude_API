# ==============================================================
# Network Device Inventory
# ==============================================================
# To add a new device, copy a device block below and fill in
# the fields. Only 'host' and 'device_type' are required.
#
# Supported device_type values (Netmiko):
#   cisco_ios, cisco_nxos, cisco_xr, arista_eos,
#   juniper_junos, linux, etc.
# ==============================================================

# --- Example Cisco vIOS Routers ---
vIOS-R1:
  host: 192.168.1.101
  device_type: cisco_ios
  username: your_username
  password: your_password
  description: "vIOS Router 1"

vIOS-R2:
  host: 192.168.1.102
  device_type: cisco_ios
  username: your_username
  password: your_password
  description: "vIOS Router 2"

vIOS-R3:
  host: 192.168.1.103
  device_type: cisco_ios
  username: your_username
  password: your_password
  description: "vIOS Router 3"

